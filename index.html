<!DOCTYPE html>
<html lang="en">
<head>

<title>Mingzhe Wang</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    background:#87CEEB;
    font-family: 'Press Start 2P', cursive;
    text-align:center;
}

/* Minecraft sky background */
header{
    padding:60px 20px;
    color:white;
    text-shadow:3px 3px #000;
}

/* Block style panels */
.panel{
    background:#8B5A2B;
    border:6px solid #5A3A1A;
    color:white;
    width:60%;
    margin:40px auto;
    padding:30px;
    box-shadow:8px 8px #3d2a14;
}

/* Pixel button */
.button{
    display:inline-block;
    margin-top:20px;
    padding:15px 25px;
    background:#3CB043;
    border:4px solid #1f6b29;
    color:white;
    text-decoration:none;
}

.button:hover{
    background:#2e8b57;
}

</style>
</head>

<body>

<header>
<h1>MINGZHE WORLD</h1>
<p>Welcome to my pixel universe</p>
</header>

<div class="panel">
<h2>Player Info</h2>
<p>Name: Mingzhe Wang</p>
<p>Class: C++ System Developer</p>
<p>Level: Graduate Student</p>
</div>

<div class="panel">
<h2>Quest Log</h2>
<p>• Building distributed storage systems</p>
<p>• Exploring database engines</p>
<p>• Mastering high performance C++</p>
</div>

<div class="panel">
<h2>Connect</h2>

</html>
